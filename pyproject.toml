[tool.pytest.ini_options]
# The linter lives in shared/scripts so skills can reference it via
# ${CLAUDE_PLUGIN_ROOT}; put it on the import path for the tests.
pythonpath = ["shared/scripts"]
testpaths = ["tests"]
# Fixtures under tests/fixtures are deliberately malformed SKILL.md files used as
# test data, not test modules — keep pytest from trying to collect them.
norecursedirs = ["tests/fixtures"]
markers = [
    "live: hits a real external service (the BlazeMeter API, or a local InfluxDB 2.x); auto-runs when the relevant credentials are present, auto-skips otherwise (CI has none)",
]
